<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>KEANO ROMEO — LORD OF THE LIGHT I ⚔️</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap"
    rel="stylesheet">
  <style>
    /* =========================================================================
       1. V3: CORE RESET & FONTS
       ========================================================================= */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Press Start 2P', monospace;
      color: white;
      touch-action: none;
    }

    /* Fullscreen Game Container */
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Core Rendering Canvas */
    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      /* Image Rendering crisp for pixel art, but we use high res AI art, so normal is fine */
      /* image-rendering: pixelated; */
    }

    /* Global Helper Classes */
    .hidden {
      display: none !important;
    }

    .neon-text {
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
    }

    /* =========================================================================
       2. UI SCREENS (OVERLAYS)
       ========================================================================= */
    /* 2.1 MAIN MENU (State 1) */
    #main-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: url('assets/UX_Cosmic_Shimmer.png') center/cover no-repeat;
    }

    @keyframes thunder-shake {
      0% {
        transform: translate(0, 0);
      }

      10% {
        transform: translate(-8px, 6px) scale(1.02);
        filter: brightness(2) contrast(1.5);
      }

      15% {
        transform: translate(6px, -6px) scale(1.03);
        filter: brightness(3.5) contrast(2) saturate(0.5);
      }

      25% {
        transform: translate(-10px, 5px) scale(1.02);
        filter: brightness(1.8) contrast(1.5);
      }

      35% {
        transform: translate(5px, -4px) scale(1.02);
        filter: brightness(1.2);
      }

      45% {
        transform: translate(-4px, 6px) scale(1.01);
        filter: brightness(1);
      }

      60% {
        transform: translate(3px, -2px) scale(1.01);
      }

      100% {
        transform: translate(0, 0) scale(1);
      }
    }

    .lightning-active {
      animation: thunder-shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
    }

    .menu-logo-container {
      text-align: center;
      margin-bottom: 50px;
      z-index: 101;
      pointer-events: none;
    }

    .main-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(4rem, 10vw, 7.5rem);
      letter-spacing: 5px;
      margin-bottom: -10px;
      text-transform: uppercase;

      background: repeating-linear-gradient(0deg,
          #00ffff 0px,
          #00ffff 4px,
          #0088cc 4px,
          #0088cc 6px);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 2px #fff;

      filter: drop-shadow(3px 3px 0px #8a2be2) drop-shadow(6px 6px 0px #4a00e0);
      animation: pulsate-title 3s infinite alternate;
    }

    .sub-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 4vw, 3rem);
      color: #fff;
      -webkit-text-stroke: 1px #000;
      letter-spacing: 12px;
      margin-top: 15px;
      text-shadow: 2px 2px 0 #8a2be2, 0 0 15px #ff00ff;
    }

    /* Capcom Style Arcade Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 102;
    }

    .capcom-btn {
      background: rgba(0, 0, 0, 0.7);
      cursor: pointer;
      padding: 15px 40px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 2vw, 1.5rem);
      color: #fff;
      border: 4px solid #fff;
      text-transform: uppercase;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5), 0 0 15px rgba(255, 255, 255, 0.5);
      transition: all 0.1s;
      position: relative;
      overflow: hidden;
    }

    .capcom-btn:hover:not(:disabled) {
      background: #fff;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 30px #fff;
    }

    .capcom-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .capcom-btn:disabled {
      border-color: #444;
      color: #444;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Padlock for locked modes */
    .btn-lock {
      position: absolute;
      right: 15px;
      top: 15px;
      font-size: 1.2rem;
    }

    @keyframes pulsate-title {
      0% {
        text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
      }

      100% {
        text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff;
      }
    }

    /* 2.2 CHARACTER SELECT (State 3) */
    #char-select {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 90;
      background: linear-gradient(135deg, #0a001a 0%, #000033 100%);
      display: flex;
      flex-direction: row;
      padding: 20px;
    }

    /* Keep bottom area free for virtual pads on mobile */
    @media (max-width: 800px) {
      #char-select {
        flex-direction: column;
        padding-bottom: 30vh;
      }
    }

    .cs-left {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cs-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: rgba(0, 10, 30, 0.6);
      backdrop-filter: blur(10px);
      border-left: 2px solid #00ffff;
      box-shadow: -10px 0 30px rgba(0, 255, 255, 0.1);
      padding: 5px 0 0 0;
      position: relative;
      overflow-y: auto;
    }

    #cs-title {
      font-size: 2rem;
      color: #ffcc00;
      text-align: center;
      text-shadow: 0 0 10px #ffcc00;
      margin-bottom: 20px;
    }

    .cs-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      padding: 12px;
      border: 2px solid #333;
      border-radius: 8px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .cs-portrait {
      width: 100%;
      aspect-ratio: 1;
      border: 3px solid #333;
      background: #111;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }

    .cs-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }

    .cs-portrait.selected {
      border-color: #00ffff;
      box-shadow: 0 0 15px #00ffff;
      transform: scale(1.1);
      z-index: 2;
    }

    /* Highlight the boss/Keano specifically */
    .cs-portrait.boss {
      border-color: #ff0000;
    }

    .cs-portrait.boss.selected {
      box-shadow: 0 0 20px #ff0000;
    }

    .cs-portrait.variant {
      border-color: #ffcc00;
    }

    .cs-portrait.variant.selected {
      border-color: #ffcc00;
      box-shadow: 0 0 20px #ffcc00;
    }

    .cs-portrait-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-size: 0.5rem;
      text-align: center;
      padding: 2px 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Orbitron', sans-serif;
    }

    .cs-info-panel {
      padding: 5px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-grow: 0;
    }

    /* Character Display */
    #cs-preview-img {
      width: 100%;
      max-height: 45vh;
      object-fit: contain;
      object-position: top center;
      margin: 0;
      padding: 5px;
      filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.4));
      border-bottom: 1px solid rgba(0, 255, 255, 0.4);
      background: linear-gradient(to top, rgba(0, 200, 255, 0.1), transparent);
    }

    #cs-name {
      font-size: 1.3rem;
      color: #fff;
      text-shadow: 0 0 10px #fff;
      margin: 3px 0 2px;
      text-align: center;
    }

    #cs-title-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: #00ffff;
      margin-bottom: 5px;
      text-align: center;
    }

    .cs-stats {
      width: 100%;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
    }

    .cs-stat-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .cs-stat-label {
      width: 50px;
      color: #ccc;
    }

    .cs-stat-bar-bg {
      flex: 1;
      height: 12px;
      background: #111;
      border: 1px solid #444;
      border-radius: 3px;
      overflow: hidden;
    }

    .cs-stat-fill {
      height: 100%;
      width: 0%;
      transition: width 0.4s ease-out;
      border-radius: 3px;
      box-shadow: 0 0 6px currentColor;
    }

    .btn-select-confirm {
      margin-top: auto;
      width: 90%;
      margin-bottom: 20px;
      padding: 20px;
      font-size: 2rem;
      background: linear-gradient(90deg, #00ffff, #0055ff);
      color: #000;
      border: 3px solid #fff;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      animation: pulsate-title 1s infinite alternate;
      text-transform: uppercase;
      font-weight: 900;
      box-shadow: 0 0 20px #00ffff;
      transition: all 0.2s;
    }

    .btn-select-confirm:hover {
      background: #fff;
      box-shadow: 0 0 40px #fff, inset 0 0 15px #00ffff;
      transform: scale(1.05);
    }

    /* 2.3 OPTIONS & HUD/PAUSE MENU */
    #pause-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 150;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .options-panel {
      background: rgba(0, 20, 40, 0.9);
      border: 2px solid #00ffff;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
      max-width: 600px;
      width: 90%;
    }

    .opt-title {
      color: #00ffff;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 0.8rem;
    }

    input[type=range] {
      width: 60%;
      accent-color: #00ffff;
    }

    /* Controls Tutorial Section */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      border-top: 1px solid #444;
      padding-top: 15px;
    }

    .ctrl-key {
      color: #ffcc00;
      font-weight: bold;
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #555;
    }

    /* Hamburger Button (Always visible during gameplay) */
    /* === INSERT COIN / CREDITS SYSTEM === */
    .insert-coin-bar {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      z-index: 20;
    }

    .coin-icon {
      font-size: 2rem;
      animation: coinSpin 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 8px #ffcc00);
    }

    @keyframes coinSpin {

      0%,
      100% {
        transform: scaleX(1);
        opacity: 1;
      }

      50% {
        transform: scaleX(0.1);
        opacity: 0.7;
      }
    }

    .insert-coin-text {
      font-family: 'Press Start 2P', 'Orbitron', monospace;
      font-size: 1rem;
      color: #ffcc00;
      text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff8800;
      letter-spacing: 3px;
    }

    @keyframes insertBlink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    .credit-counter {
      font-family: 'Press Start 2P', 'Orbitron', monospace;
      font-size: 0.85rem;
      color: #00ffff;
      text-shadow: 0 0 8px #00ffff;
      position: absolute;
      bottom: 10px;
      right: 20px;
      z-index: 20;
    }

    /* When credits are empty: blink red + clickable */
    .insert-coin-bar.empty {
      cursor: pointer;
    }

    .insert-coin-bar.empty .insert-coin-text {
      color: #ff0033;
      text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0000;
      animation: insertBlink 0.4s ease-in-out infinite;
    }

    .insert-coin-bar.empty .coin-icon {
      filter: drop-shadow(0 0 8px #ff0033) hue-rotate(180deg);
    }

    /* SKIP BUTTON (Voice Sequences) */
    #btn-skip-sequence {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #ffcc00;
      color: #ffcc00;
      font-family: 'Press Start 2P', 'Orbitron', monospace;
      font-size: 0.85rem;
      padding: 12px 30px;
      cursor: pointer;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #ffcc00;
      animation: insertBlink 1s ease-in-out infinite;
      transition: all 0.2s;
    }

    #btn-skip-sequence:hover {
      background: rgba(255, 200, 0, 0.15);
      border-color: #fff;
      color: #fff;
    }

    #btn-hamburger {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 80;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #fff;
      color: #fff;
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 2.4 VIRTUAL GAMEPAD (Mobile Only) */
    #mobile-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35vh;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      padding: 20px;
      pointer-events: none;
    }

    .mc-zone {
      pointer-events: auto;
      display: flex;
      align-items: flex-end;
    }

    #joystick-base {
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      position: relative;
    }

    #joystick-knob {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      position: absolute;
      top: 35px;
      left: 35px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .action-btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      border: 2px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-punch {
      background: rgba(0, 150, 255, 0.4);
    }

    #btn-kick {
      background: rgba(255, 0, 0, 0.4);
    }

    #btn-block {
      background: rgba(100, 100, 100, 0.4);
    }

    #btn-special {
      background: rgba(255, 200, 0, 0.4);
    }

    #btn-jump {
      background: rgba(0, 255, 100, 0.4);
      margin-bottom: 20px;
    }

    @media (min-width: 1025px) {
      #mobile-controls {
        display: none !important;
      }
    }

    /* =========================================================================
       V3: Scene Manager & Transitions 
       ========================================================================= */
    #scene-fader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center,
          rgba(0, 0, 0, 1) 40%,
          rgba(0, 30, 60, 0.98) 60%,
          rgba(0, 180, 255, 0.15) 80%,
          rgba(120, 0, 255, 0.1) 100%);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    #scene-fader.fade-in {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

<body>

  <div id="game-container">
    <!-- Scene Manager Overlay -->
    <div id="scene-fader"></div>
    <!-- V7 QA DEBUG LOGGER -->
    <div id="qa-logger"
      style="position:fixed; top:10px; left:10px; width:40%; max-height:30%; overflow-y:auto; background:rgba(0,0,0,0.8); color:#ff5555; font-family:monospace; font-size:12px; z-index:9999; pointer-events:none; padding:10px; border:1px solid #ff0000; border-radius:5px; display:none;">
      <strong>V7 QA ERROR LOG:</strong><br>
    </div>

    <div id="crt-overlay"></div>

    <!-- Main Render Canvas -->
    <canvas id="gameCanvas"></canvas>
    <button id="btn-skip-sequence" class="hidden">⏭ SKIP</button>

    <!-- STATE 1: Main Menu -->
    <div id="main-menu">
      <div class="menu-logo-container">
        <h1 class="main-title">KEANO ROMEO</h1>
        <h2 class="sub-title">LORD OF THE LIGHT 1</h2>
      </div>

      <div class="btn-group">
        <button class="capcom-btn" id="btn-story">STORY MODUS</button>
        <button class="capcom-btn" id="btn-arcade" disabled
          style="color:#ff0033; border-color:#ff0033; cursor:not-allowed; opacity:0.6;">🔒 ARCADE MODUS</button>
        <button class="capcom-btn" id="btn-versus" disabled
          style="color:#ff0033; border-color:#ff0033; cursor:not-allowed; opacity:0.6;">🔒 VERSUS MODUS</button>
        <button class="capcom-btn" id="btn-options-menu">OPTIONEN</button>
      </div>
      <script>
        // =========================================================================
        // V7 QA GLOBAL ERROR CATCHER
        // =========================================================================
        const qaLogger = document.getElementById('qa-logger');
        let hasErrors = false;

        // V9 QA Metrics Tracker
        const QATracker = {
          active: window.location.search.includes('qa=true'),
          matches: 0,
          hits: 0,
          misses: 0, // attacks that didn't hit
          specials: 0,
          glowTriggers: 0,
          kos: 0,
          frameDrops: 0,
          print() {
            return `
                <div style="background:#000; color:#0f0; border:2px solid #0f0; padding:20px; text-align:left; font-family:monospace; font-size:16px;">
                  <h3>✅ QA AUTOMATION COMPLETE</h3>
                  <hr>
                  Matches Played: ${this.matches}<br>
                  Total Hits Connected: ${this.hits}<br>
                  Attacks Missed: ${this.misses}<br>
                  Special Attacks Fired: ${this.specials}<br>
                  Glow FX Triggers: ${this.glowTriggers}<br>
                  Total KOs: ${this.kos}<br>
                  Severe Frame Drops: ${this.frameDrops}<br>
                  Memory Errors: ${hasErrors ? 'YES' : 'NONE'}
                </div>
              `;
          }
        };
        window.onerror = function (msg, url, lineNo, columnNo, error) {
          if (!hasErrors) { qaLogger.style.display = 'block'; hasErrors = true; }
          const errStr = `[ERR] ${msg} <br> <span style="color:#aaa;">Line ${lineNo}:${columnNo}</span><br>`;
          qaLogger.innerHTML += errStr;
          console.error("QA CAUGHT ERROR:", msg, url, lineNo, columnNo, error);
          return false;
        };
        window.onunhandledrejection = function (event) {
          if (!hasErrors) { qaLogger.style.display = 'block'; hasErrors = true; }
          qaLogger.innerHTML += `[PROMISE] ${event.reason}<br>`;
          console.error("QA UNHANDLED PROMISE:", event.reason);
        };

        // Boot check: unlock if Story was already completed on this device
        if (localStorage.getItem('arcadeUnlocked') === 'true') {
          ['btn-arcade', 'btn-versus'].forEach(id => {
            const b = document.getElementById(id);
            b.disabled = false; b.style.color = '#00ffff'; b.style.borderColor = '#00ffff'; b.style.cursor = 'pointer'; b.style.opacity = '1';
          });
          document.getElementById('btn-arcade').textContent = 'ARCADE MODUS';
          document.getElementById('btn-versus').textContent = 'VERSUS MODUS';
        }
      </script>

      <!-- INSERT COIN & CREDITS -->
      <div class="insert-coin-bar" id="insert-coin-bar">
        <span class="coin-icon">🪙</span>
        <span class="insert-coin-text" id="insert-coin-text">INSERT COIN</span>
        <span class="coin-icon">🪙</span>
      </div>
      <div class="credit-counter" id="credit-counter">CREDIT(S): 3</div>
    </div>

    <!-- STATE 3: Character Select -->
    <div id="char-select" class="hidden">
      <div class="cs-left">
        <div id="cs-title">SELECT YOUR FIGHTER</div>
        <div class="cs-grid" id="cs-grid">
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="cs-right">
        <img id="cs-preview-img" src="" alt="">
        <div class="cs-info-panel">
          <div id="cs-flag" style="font-size:2rem;">🌍</div>
          <div id="cs-name">???</div>
          <div id="cs-title-label">...</div>
          <div id="cs-desc" style="font-size:0.7rem; color:#aaa; text-align:center; margin:5px 0 10px;">Wähle deinen
            Kämpfer</div>
          <button class="btn-select-confirm" id="btn-confirm-fighter">FIGHT!</button>
          <div class="cs-stats">

  <script>
    // =========================================================================
    // V3: "LORD OF THE LIGHT" GAME ENGINE
    // =========================================================================

    // Globals
    const C = document.getElementById('gameCanvas');
    const X = C.getContext('2d', { alpha: false }); // Optimize for no transparency behind canvas
    let gameState = 'init'; // init, menu, prologue, select, vs_screen, fighting, ko, reflexion, epilogue, credits
    let time = 0, lastTime = performance.now(), stateTimer = 0;
    let nextLightning = 4000; // Initialize first thunder rumble for Main Menu

    let lastFpsTime = performance.now();
    let currentFps = 60;

    // =========================================================================
    // ARCADE CREDIT SYSTEM
    // =========================================================================
    let arcadeCredits = 3;

    function updateCreditDisplay() {
      const el = document.getElementById('credit-counter');
      if (el) el.textContent = `CREDIT(S): ${arcadeCredits}`;
      const bar = document.getElementById('insert-coin-bar');
      if (bar) {
        if (arcadeCredits <= 0) {
          bar.classList.add('empty');
        } else {
          bar.classList.remove('empty');
        }
      }
    }

    function useCredit() {
      arcadeCredits = Math.max(0, arcadeCredits - 1);
      updateCreditDisplay();
    }

    function insertCoin() {
      if (arcadeCredits <= 0) {
        arcadeCredits = 3;
        updateCreditDisplay();
        SFX.uiHover();
      }
    }

    // Resize Handle
    function resize() { C.width = window.innerWidth; C.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // =========================================================================
    // 1. AUDIO ENGINE (Synthesizer & Background Tracks)
    // =========================================================================
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    const SFX = {
      _musicGain: null,
      _sfxGain: null,

      // V4 AUDIO MANAGER PROPERTIES
      bgmNode: null,        // Currently playing background music Audio element
      voiceNode: null,      // Currently playing voice line Audio element
      activeBGMUrl: null,

      init() {
        this._musicGain = AC.createGain(); this._musicGain.gain.value = 0.5; this._musicGain.connect(AC.destination);
        this._sfxGain = AC.createGain(); this._sfxGain.gain.value = 0.8; this._sfxGain.connect(AC.destination);
      },

      setMusicVol(v) {
        if (this._musicGain) this._musicGain.gain.value = v;
        if (this.bgmNode) this.bgmNode.volume = v;
      },
      setSFXVol(v) { if (this._sfxGain) this._sfxGain.gain.value = v; },

      setVoiceVol(v) {
        if (this.voiceNode) this.voiceNode.volume = v;
      },

      duckBGM(targetVol = 0.15, durationMs = 500) {
        if (this._musicGain) {
          this._musicGain.gain.cancelScheduledValues(AC.currentTime);
          this._musicGain.gain.linearRampToValueAtTime(targetVol, AC.currentTime + (durationMs / 1000));
        }
      },
      restoreBGM(durationMs = 800) {
        if (this._musicGain) {
          const userVol = document.getElementById('vol-music') ? parseFloat(document.getElementById('vol-music').value) : 0.5;
          this._musicGain.gain.cancelScheduledValues(AC.currentTime);
          this._musicGain.gain.linearRampToValueAtTime(userVol, AC.currentTime + (durationMs / 1000));
        }
      },

      // --- ASSET-BASED AUDIO (V4) ---

      playBGM(url, loop = true, fadeTime = 0.5) {
        if (this.activeBGMUrl === url) {
          this.restoreBGM(); // Always ensure it's un-ducked if re-requested
          return;
        }

        const userVol = document.getElementById('vol-music') ? parseFloat(document.getElementById('vol-music').value) : 0.5;
        const nextVol = userVol;

        if (AC.state === 'suspended') AC.resume();

        // Crossfade out old using WebAudio Gain if available, or fallback
        const oldBGM = this.bgmNode;
        const oldGain = this.bgmGain;
        if (oldBGM) {
          if (oldGain && oldGain.gain) {
            const currentVol = oldGain.gain.value;
            oldGain.gain.cancelScheduledValues(AC.currentTime);
            oldGain.gain.setValueAtTime(currentVol, AC.currentTime);
            oldGain.gain.linearRampToValueAtTime(0, AC.currentTime + fadeTime);
            setTimeout(() => {
              oldBGM.pause(); oldBGM.removeAttribute('src');
            }, fadeTime * 1000);
          } else {
            // Fallback for older nodes without Gain wrapper
            oldBGM.pause(); oldBGM.removeAttribute('src');
          }
        }

        // Stop procedural stuff if any
        this.stopMusic();

        this.activeBGMUrl = url;
        if (!url) {
          this.bgmNode = null;
          this.bgmGain = null;
          return;
        }

        // Catch main_menu.mp3 to play procedural ambient pad instead
        if (url.includes('main_menu.mp3')) {
          this._playMenuAmbient();
          return; // Skip loading actual mp3
        } else {
          this.stopMenuAmbient();
        }

        const newAudio = new Audio();
        newAudio.loop = loop;
        newAudio.crossOrigin = 'anonymous';

        // Connect to WebAudio
        const source = AC.createMediaElementSource(newAudio);
        const gainNode = AC.createGain();
        gainNode.gain.setValueAtTime(0, AC.currentTime); // Start silenced

        source.connect(gainNode);
        gainNode.connect(AC.destination); // Bypass sfxGain for independent BGM control

        // Hook up fade in
        newAudio.addEventListener('canplay', () => {
          newAudio.play().catch(e => console.warn("BGM Playblock: User interaction needed", e));

          gainNode.gain.cancelScheduledValues(AC.currentTime);
          gainNode.gain.setValueAtTime(0, AC.currentTime);
          gainNode.gain.linearRampToValueAtTime(nextVol, AC.currentTime + fadeTime);
        }, { once: true });

        newAudio.src = url;
        this.bgmNode = newAudio;
        this.bgmGain = gainNode;
      },

      playVoice(url) {
        if (this.voiceNode) {
          this.voiceNode.pause();
        }
        if (!url) return;
        this.voiceNode = new Audio(url);
        // Default to max voice volume or what's set in options
        const voiceVol = document.getElementById('vol-voice') ? parseFloat(document.getElementById('vol-voice').value) : 0.9;
        this.voiceNode.volume = voiceVol;

        this.duckBGM();
        this.voiceNode.addEventListener('ended', () => {
          this.restoreBGM();
        });

        this.voiceNode.play().catch(e => console.warn("Voice Playblock:", e));
      },

      playSound(url) {
        if (!url) return;
        const a = new Audio(url);
        const sfxVol = this._sfxGain ? this._sfxGain.gain.value : 0.8;
        a.volume = sfxVol;
        a.play().catch(e => console.warn("SFX Playblock:", e));
      },

      // --- LEGACY PROCEDURAL SFX (Kept for compatibility until assets are mapped) ---

      _noiseLayer(dur, vol, filterFreq) {
        if (AC.state === 'suspended') AC.resume();
        const bufferSize = AC.sampleRate * dur;
        const buffer = AC.createBuffer(1, bufferSize, AC.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

        const noise = AC.createBufferSource(); noise.buffer = buffer;
        const speed = (typeof gameSpeedMult !== 'undefined') ? gameSpeedMult : 1;
        noise.playbackRate.value = speed;

        const filter = AC.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = filterFreq;
        const env = AC.createGain(); env.gain.setValueAtTime(vol, AC.currentTime); env.gain.exponentialRampToValueAtTime(0.01, AC.currentTime + dur / speed);

        noise.connect(filter); filter.connect(env); env.connect(this._sfxGain);
        noise.start(); noise.stop(AC.currentTime + dur / speed);
      },

      _tone(freq, dur, type = 'sine', vol = 1.0) {
        if (AC.state === 'suspended') AC.resume();
        const speed = (typeof gameSpeedMult !== 'undefined') ? gameSpeedMult : 1;
        const o = AC.createOscillator(); const g = AC.createGain();
        o.type = type; o.frequency.setValueAtTime(freq * speed, AC.currentTime);
        g.gain.setValueAtTime(vol, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, AC.currentTime + dur / speed);
        o.connect(g); g.connect(this._sfxGain);
        o.start(); o.stop(AC.currentTime + dur / speed);
      },

      hitBlock() {
        this._tone(300, 0.1, 'square', 0.4);
        this._noiseLayer(0.1, 0.3, 1000);
      },
      hitLight() {
        const t = AC.currentTime;
        const osc = AC.createOscillator(); osc.type = 'square'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
        const gain = AC.createGain(); gain.gain.setValueAtTime(0.7, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.connect(gain); gain.connect(this._sfxGain); osc.start(); osc.stop(t + 0.1);
        this._noiseLayer(0.1, 0.4, 4000);
      },
      hitHeavy() {
        if (AC.state === 'suspended') AC.resume();
        const t = AC.currentTime;
        // Deep body thud
        const osc = AC.createOscillator(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, t); osc.frequency.exponentialRampToValueAtTime(30, t + 0.25);
        const gain = AC.createGain(); gain.gain.setValueAtTime(1.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
        osc.connect(gain); gain.connect(this._sfxGain); osc.start(); osc.stop(t + 0.25);

        // Secondary punchy sub layer
        const sub = AC.createOscillator(); sub.type = 'sine'; sub.frequency.setValueAtTime(120, t); sub.frequency.exponentialRampToValueAtTime(20, t + 0.25);
        const subGain = AC.createGain(); subGain.gain.setValueAtTime(2.0, t); subGain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
        sub.connect(subGain); subGain.connect(this._sfxGain); sub.start(); sub.stop(t + 0.25);

        this._noiseLayer(0.2, 0.8, 6000);
      },
      dash() {
        this._noiseLayer(0.25, 0.4, 800);
        this._tone(400, 0.2, 'sine', 0.2);
      },
      uiHover() {
        if (AC.state === 'suspended') AC.resume();
        const o = AC.createOscillator(); const g = AC.createGain();
        o.type = 'triangle'; o.frequency.setValueAtTime(440, AC.currentTime);
        o.frequency.exponentialRampToValueAtTime(880, AC.currentTime + 0.05);
        g.gain.setValueAtTime(0.1, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, AC.currentTime + 0.05);
        o.connect(g); g.connect(this._sfxGain); o.start(); o.stop(AC.currentTime + 0.05);
      },
      uiSelect() {
        if (AC.state === 'suspended') AC.resume();
        const o = AC.createOscillator(); const g = AC.createGain();
        o.type = 'square'; o.frequency.setValueAtTime(440, AC.currentTime);
        o.frequency.exponentialRampToValueAtTime(110, AC.currentTime + 0.15);
        g.gain.setValueAtTime(0.2, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, AC.currentTime + 0.15);
        o.connect(g); g.connect(this._sfxGain); o.start(); o.stop(AC.currentTime + 0.15);
      },

      // Custom Procedural Ambient for Menu
      ambientActive: false,
      menuPad: null,
      pianoInterval: null,

      _playMenuAmbient() {
        if (this.ambientActive) return;
        this.ambientActive = true;
        if (AC.state === 'suspended') AC.resume();

        // Deep warm pad generators
        const padOsc = AC.createOscillator(); padOsc.type = 'sine'; padOsc.frequency.value = 55; // Deep A1
        const padOsc2 = AC.createOscillator(); padOsc2.type = 'triangle'; padOsc2.frequency.value = 55.5; // Detuned
        const padGain = AC.createGain(); padGain.gain.value = 0.5;

        padOsc.connect(padGain); padOsc2.connect(padGain);

        // Reverb tail
        const delay = AC.createDelay(); delay.delayTime.value = 0.5;
        const feedback = AC.createGain(); feedback.gain.value = 0.45;
        delay.connect(feedback); feedback.connect(delay);

        const filter = AC.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 400; // Warm muffling
        padGain.connect(filter); filter.connect(delay); filter.connect(this._musicGain);
        delay.connect(this._musicGain);

        padOsc.start(); padOsc2.start();
        this.menuPad = { o1: padOsc, o2: padOsc2, g: padGain, d: delay, f: filter };

        // Random subtle piano drops
        this.pianoInterval = setInterval(() => {
          if (!this.ambientActive) return;
          const notes = [220, 246.94, 277.18, 329.63, 164.81]; // A min pentatonic scale
          const note = notes[Math.floor(Math.random() * notes.length)];
          this._tone(note, 5.0, 'sine', 0.2);
        }, 4000);
      },

      stopMenuAmbient() {
        if (!this.ambientActive) return;
        this.ambientActive = false;
        clearInterval(this.pianoInterval);
        if (this.menuPad) {
          this.menuPad.g.gain.linearRampToValueAtTime(0, AC.currentTime + 2);
          const p = this.menuPad;
          setTimeout(() => { p.o1.stop(); p.o2.stop(); }, 2000);
          this.menuPad = null;
        }
      },

      // Legacy Hooks (Will be routed to BGM loader later)
      playTitleMusic() {
        // Temporarily maps to empty or old tone logic if we want, or we can leave it empty to force Asset use
        // Leaving empty as we will trigger playBGM directly!
      },
      playArenaMusic(bpm) {
        // Leaving empty as we will trigger playBGM
      },
      stopMusic() {
        this.stopMenuAmbient();
        // Legacy cleanup
      }
    };

    function removeWhiteBackground(imgObj, src) {
      const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d', { willReadFrequently: true });
      cvs.width = imgObj.width || 1024; cvs.height = imgObj.height || 1024; ctx.drawImage(imgObj, 0, 0);
      const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height); const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i] > 240 && data[i + 1] > 240 && data[i + 2] > 240) { data[i + 3] = 0; } // Strict white to alpha
      }
      ctx.putImageData(imgData, 0, 0);
      processedSprites[src] = cvs;
    }

        i.onload = () => {
          // Tunnel the loaded image directly into the global object so Canvas can find it instantly
          rawImgs[s] = i;

            removeWhiteBackground(i, s);
          }
          assetsLoaded++;
          resolve();

        i.onerror = () => {
          console.warn("Asset failed to load:", s);

      const handleJoy = (ex, ey) => {
        const rect = joyArea.getBoundingClientRect();
        const cx = rect.left + center;
        const cy = rect.top + center;
        const dx = ex - cx;
        const dy = ey - cy;
        const maxDist = 55; // Max knob travel
        const dist = Math.min(Math.sqrt(dx * dx + dy * dy), maxDist);
        const angle = Math.atan2(dy, dx);

        const nx = Math.cos(angle) * dist;
        const ny = Math.sin(angle) * dist;

        joyKnob.style.transform = `translate(${nx}px, ${ny}px)`;

        // Reset inputs
        keys['arrowup'] = keys['arrowleft'] = keys['arrowdown'] = keys['arrowright'] = false;
        keys['w'] = keys['a'] = keys['s'] = keys['d'] = false;

        // Deadzone of 15px
        if (dist > 15) {
          if (nx < -20) { keys['a'] = true; keys['arrowleft'] = true; }
          if (nx > 20) { keys['d'] = true; keys['arrowright'] = true; }

      constructor(x, y, dir, type, fromPlayer) {

        return false;

    // ===== PARTICLES (MASSIVE CAPCOM-STYLE VFX) =====
    let particles = [];

      checkHit(f) {

        if ((f.state === 'hit' || f.state === 'ko' || f.state === 'dash' || f.state === 'special_roll') && Math.abs(f.knockVX) > 2) {
          if (Math.abs(this.x - f.x) < this.w / 2 + f.w / 2 && f.y >= GROUND() - this.h) {
            this.broken = true; SFX.hitHeavy(); screenShake += 6;
            for (let i = 0; i < 8; i++) spawnParticles(this.x, this.y - this.h / 2, 'hitspark');
          }
        }
      }
    }

    // ============================================================
    // FIGHTER CLASS (V3 Clean Rendering)
    // ============================================================
    let screenShake = 0, flashTimer = 0, finisherTint = 0;
    let comboCount = 0, comboTimer = 0;
    let gameTimerStyle = 'normal';
    let defaultRoundTime = 99;
    let gameDifficulty = 'normal';
    let gameSpeedMult = 1.0;

    // =========================================================================
    // V3 Scene / Transition Manager
    // Inspired by Unity SceneManager / Godot Tween Fades
    // =========================================================================
    const TransitionManager = {
      isTransitioning: false,
      fadeScreen: function (fadeInDuration, waitDuration, fadeOutDuration, onMidpoint) {
        if (this.isTransitioning) return;
        this.isTransitioning = true;
        const fader = document.getElementById('scene-fader');

        // 1. Fade Into Black
        fader.style.transition = `opacity ${fadeInDuration}ms ease-in-out`;
        fader.classList.add('fade-in');

        setTimeout(() => {
          // 2. Midpoint (Screen is fully black) -> Swap States!
          if (onMidpoint) onMidpoint();

          setTimeout(() => {
            // 3. Fade Out of Black into new Scene
            fader.style.transition = `opacity ${fadeOutDuration}ms ease-in-out`;
            fader.classList.remove('fade-in');

            setTimeout(() => {
              this.isTransitioning = false;
            }, fadeOutDuration);
          }, waitDuration);
        }, fadeInDuration);
      },

      switchState: function (newStateConfig) {
        this.fadeScreen(
          newStateConfig.fadeIn || 400,
          newStateConfig.wait || 100,
          newStateConfig.fadeOut || 400,
          () => {
            if (newStateConfig.hideDOM) {
              newStateConfig.hideDOM.forEach(id => document.getElementById(id).classList.add('hidden'));
            }
            if (newStateConfig.showDOM) {
              newStateConfig.showDOM.forEach(id => document.getElementById(id).classList.remove('hidden'));
            }
            if (newStateConfig.setGameState) {
              gameState = newStateConfig.setGameState;
            }
            if (newStateConfig.onSwap) {
              newStateConfig.onSwap();
            }
          }
        );
      }
    };

    // Hadouken motion parser
    function checkMotion(sequence) {
      if (inputHistory.length < sequence.length) return false;
      const recent = inputHistory.slice(-sequence.length);
      // Give a generous 500ms window for the sequence to complete correctly
      if (Date.now() - recent[0].time > 500) return false;
      for (let i = 0; i < sequence.length; i++) {
        if (recent[i].key !== sequence[i]) return false;
      }
      return true;
    }

    class HybridFighter {
      constructor(startX, startY, isPlayer, color, ld = null) {
        this.x = startX;
        this.y = startY || GROUND();
        this.vy = 0;

        this.isPlayer = isPlayer;
        this.facingRight = isPlayer;

        // Force strictly the preloaded images from Asset Loader rule
        this.fighterDir = ld?.fighterDir || '';
        this.cleanImgSrc = this.fighterDir + (this.facingRight ? '/_right.png' : '/_left.png');

        this.ld = ld;
        this.wasFacingRight = this.facingRight;
        this.isBackTurned = false;

        this.color = ld?.col || '#00aaff';
        this.maxHP = 100 * (ld?.hpMult || 1) * (isPlayer ? 1 : (typeof getDiff === 'function' ? getDiff().hpScale : 1));
        this.hp = this.maxHP;
        this.super = isPlayer ? 0 : 0;
        this.state = 'idle';
        this.stateTimer = 0;
        this.knockVX = 0;
        this.specialCD = 0;
        this.t = Math.random() * Math.PI * 2;
        this.hitFlash = 0;
        this.hitStop = 0;
        this.shoutTimer = 0;

        this.inputBuffer = [];
        this.inputTimer = 0;
        this.timeScale = 1.0;
        this.companion = null;
        if (this.fighterDir.includes('vikingo_') || (ld && ld.level === 14)) {
          this.companion = new Companion(this);
        }
      }

      get w() { return FW(); }
      get h() { return FH(); }

      takeHit(dmg, dir, isHeavy = false) {
        if (this.state === 'block') {
          this.hp -= dmg * 0.15; // Chip damage
          this.knockVX = dir * (isHeavy ? 12 : 6);
          this.hitStop = isHeavy ? 0.15 : 0.08;
          SFX.hitBlock();
        } else {
          const wasAlive = this.hp > 0;
          this.hp -= dmg;
          this.state = 'hit';
          this.stateTimer = isHeavy ? 0.65 : 0.40;
          this.knockVX = dir * (isHeavy ? 20 : 12);
          this.hitFlash = 1;
          this.hitStop = isHeavy ? 0.22 : 0.12;
          screenShake = isHeavy ? 15 : 8;
          SFX.hitHeavy();
          if (wasAlive && this.hp <= 0 && isHeavy) {
            finisherTint = 1.0;
            screenShake = 35;
            this.hitStop = 0.5; // Massive hitstop
          }
          if (this.isPlayer) { comboCount = 0; comboTimer = 0; }
        }
        this.hp = Math.max(0, this.hp);
      }

      update(dt, opponent) {
        dt = dt * this.timeScale;
        if (this.hitStop > 0) {
          this.hitStop -= dt;
          return;
        }

        this.y += this.vy * this.timeScale;
        this.vy += GRAV * 1.35 * this.timeScale;

        if (this.y > GROUND()) {
          this.y = GROUND();
          this.vy = 0;

          if (this.state === 'roll' || this.state === 'hit' || this.state === 'ko') {
            if (this.isPlayer && this.hp > 0 && (keys['control'] || keys['alt']) && this.state !== 'ko') {
              // Tech
              this.state = 'roll';
              this.stateTimer = 0.4;
              this.knockVX = this.facingRight ? -15 : 15;
              SFX.dash();
            } else if (this.state === 'roll') {
              this.state = 'idle';
              this.knockVX = 0;
            }
          }
        }

        this.x += this.knockVX * this.timeScale;
        if (this.y === GROUND()) {
          if (Math.abs(this.knockVX) > 0.5) {
            let friction = (this.state === 'dash') ? 0.92 : 0.82;
            // Adjust friction scale slightly for slow mo so they don't slide forever
            if (this.timeScale < 1.0) friction = 0.95;
            this.knockVX *= friction;
          } else {
            this.knockVX = 0;
          }
        } else {
          this.knockVX *= 0.98;
        }

        this.x = Math.max(this.w * 0.5, Math.min(C.width - this.w * 0.5, this.x));

        if (opponent && this.state !== 'roll' && this.state !== 'evade_back' && this.state !== 'roll_forward') {
          this.wasFacingRight = this.facingRight;
          if (Math.abs(this.x - opponent.x) > 60) {
            this.facingRight = this.x < opponent.x;
          }
        }

        // Apply strict left/right sprite rules dynamically based on direction
        this.cleanImgSrc = this.fighterDir + (this.facingRight ? '/_right.png' : '/_left.png');
        if (this.isPlayer && !this.facingRight) this.isBackTurned = true;
        else if (this.isPlayer && this.facingRight) this.isBackTurned = false;

        if (this.companion && this.hp > 0) {
          this.companion.update(dt, opponent);
        }

        if (this.stateTimer > 0) {
          this.stateTimer -= dt;
          if (this.stateTimer <= 0) {
            if (this.y < GROUND()) this.state = 'jump';
            else this.state = 'idle';
          }
        }
        if (this.specialCD > 0) this.specialCD -= dt;
        if (this.hitFlash > 0) this.hitFlash -= dt * 3;
        this.t += dt * 8;

        if (opponent && (this.state === 'special_roll' || this.state === 'special_flip')) {
          const dist = Math.abs(this.x - opponent.x);
          const range = this.w * (this.state === 'special_roll' ? 0.9 : 1.2);
          const isOppInvincible = (opponent.state === 'roll' || opponent.state === 'evade_back' || opponent.state === 'roll_forward');
          if (dist < range && Math.sin(this.t * 5) > 0.8 && !isOppInvincible) {
            const baseDmg = this.state === 'special_roll' ? 6 : 8;
            const dir = this.facingRight ? 1 : -1;
            opponent.takeHit(baseDmg, dir, false);
            this.hitStop = 0.03;
            spawnParticles(opponent.x, opponent.y - opponent.h * 0.4, 'hitspark');
            if (this.isPlayer) {
              comboCount++; comboTimer = 1.0;
            }
          }
        }

        // Gamepad polling is global (works in menus too)
        pollGamepad();


        if (this.isPlayer && this.hp > 0 && this.state !== 'ko') {
          const inLeft = keys['arrowleft'] || keys['a'];
          const inRight = keys['arrowright'] || keys['d'];
          const inUp = keys['arrowup'] || keys['w'];
          const inDown = keys['arrowdown'] || keys['s'];
          const inPunch = keys['j'] || keys['f'];
          const inKick = keys['k'] || keys['g'];

          if (this.inputTimer > 0) this.inputTimer -= dt;
          else if (this.inputBuffer.length > 0) this.inputBuffer.shift();

          let currentDir = 'N';
          if (inRight) currentDir = 'R';
          else if (inLeft) currentDir = 'L';

          if (this.inputBuffer[this.inputBuffer.length - 1] !== currentDir) {
            this.inputBuffer.push(currentDir);
            this.inputTimer = 0.25;
            if (this.inputBuffer.length > 4) this.inputBuffer.shift();
          }

          let dashTriggered = false;
          if (this.state === 'idle' || this.state === 'walk') {
            const bufStr = this.inputBuffer.join('');
            if (bufStr.includes('RNR')) {
              this.state = 'dash'; this.stateTimer = 0.4;
              this.knockVX = 20;
              this.inputBuffer = [];
              dashTriggered = true;
              SFX.dash();
            } else if (bufStr.includes('LNL')) {
              this.state = 'dash'; this.stateTimer = 0.4;
              this.knockVX = -20;
              this.inputBuffer = [];
              dashTriggered = true;
              SFX.dash();
            }
          }

          if (!dashTriggered && (this.state === 'idle' || this.state === 'walk')) {
            let moving = false;
            if (inLeft) { this.x -= 10; moving = true; }
            if (inRight) { this.x += 10; moving = true; }

            if (moving && this.state === 'idle') this.state = 'walk';
            if (!moving && this.state === 'walk') this.state = 'idle';

            if (inUp && this.y === GROUND()) {
              this.vy = -26;
              if ((this.facingRight && inRight) || (!this.facingRight && inLeft)) {
                this.state = 'roll';
                this.stateTimer = 0.8;
                this.knockVX = this.facingRight ? 14 : -14;
                this.vy = -14;
              } else {
                this.state = 'jump';
                this.stateTimer = 0.5;
              }
            }
          }

          if (this.state === 'idle' || this.state === 'walk' || this.state === 'jump') {
            if (inPunch && this.stateTimer <= 0) this.doAttack('punch', opponent);
            if (inKick && this.stateTimer <= 0) {
              if (checkMotion([inDown, inRight, inKick]) && this.facingRight && this.super > 10) {
                this.doSuper(opponent);
              } else {
                this.doAttack('kick', opponent);
              }
            }
          }
          if (keys['u'] || inDown) { this.state = 'block'; this.stateTimer = 0.3; }

          const fw = this.facingRight ? 'd' : 'a';
          const bk = this.facingRight ? 'a' : 'd';

          if (this.specialCD <= 0) {
            if (checkMotion(['s', fw, 'l'])) this.fireProj();
            else if (checkMotion([bk, fw, 'k'])) this.doSpecialRoll(opponent);
            else if (checkMotion(['s', bk, 'k'])) this.doSpecialFlip(opponent);
            else if (keys['l']) this.fireProj();
          }

          if (keys[' '] && this.super >= 100) this.doSuper(opponent);
        }

        // --- Utility AI Core ---
        if (!this.isPlayer && opponent) {
          this.updateAI(dt, opponent);
        }
      }

      updateAI(dt, opponent) {
        if (this.state !== 'idle' && this.state !== 'walk') return;

        const dist = Math.abs(this.x - opponent.x);
        const diffMult = gameDifficulty === 'hard' ? 1.8 : (gameDifficulty === 'easy' ? 0.7 : 1.0);
        const spdMult = this.ld?.speedMult || 1.0;
        const jumpFreq = this.ld?.jumpFreq || 1.0;
        const projFreq = this.ld?.projFreq || 1.0;
        const charType = this.ld?.special || 'fire';
        const walkSpd = (gameDifficulty === 'easy' ? 4.0 : (gameDifficulty === 'hard' ? 6.0 : 5.0)) * spdMult;

        const isOpponentAttacking = (opponent.state === 'punch' || opponent.state === 'kick' || opponent.state === 'proj' || opponent.state === 'special');
        const r = Math.random();

        // 1. Evade / Defense (Highest Priority Reflex)
        if (isOpponentAttacking && dist < this.w * 1.5) {
          if (r < 0.25 * diffMult) {
            this.state = 'evade_back';
            this.stateTimer = 0.4;
            this.knockVX = (this.x > opponent.x) ? 25 : -25;
            SFX.dash();
            return;
          } else if (r < 0.5 * diffMult) {
            this.state = 'block';
            this.stateTimer = 0.5;
            return;
          }
        }

        // 2. Punish / Counter (Exploit player misses)
        if ((opponent.state === 'evade_back' || opponent.state === 'hit' || opponent.state === 'roll') && dist < this.w * 1.8) {
          if (r < 0.3 * diffMult) {
            this.state = 'dash';
            this.stateTimer = 0.4;
            this.knockVX = (this.x < opponent.x) ? 22 : -22;
            SFX.dash();
            return;
          }
        }

        // 3. Tactical Retreat (Low HP Survival)
        if (this.hp < this.maxHP * 0.25 && dist < this.w * 1.2 && r < 0.05) {
          this.state = 'evade_back';
          this.stateTimer = 0.4;
          this.knockVX = (this.x > opponent.x) ? 20 : -20;
          return;
        }

        // 4. Super Attack (Always use if full)
        let superChance = 0.10 * diffMult;
        if (charType === 'fire' || charType === 'lightning') superChance *= 1.5;
        if (this.super >= 100 && dist < this.w * 2 && r < superChance) {
          this.doSuper(opponent);
          return;
        }

        // 5. Normal Aggression & Zoning
        let idealZoningDist = this.w * 0.4;
        if (charType === 'ice') idealZoningDist = this.w * 1.5;
        else if (charType === 'dark' || charType === 'earth') idealZoningDist = this.w * 0.3;
        if (projFreq > 1.5) idealZoningDist += this.w;

        let aiMoving = false;
        if (dist > idealZoningDist + 50) {
          this.x += (opponent.x > this.x ? walkSpd : -walkSpd);
          if (this.state !== 'walk') { this.state = 'walk'; this.stateTimer = 0.2; }
          aiMoving = true;
        } else if (dist < idealZoningDist - this.w * 0.5 - 50) {
          this.x += (opponent.x > this.x ? -walkSpd : walkSpd);
          if (this.state !== 'walk') { this.state = 'walk'; this.stateTimer = 0.2; }
          aiMoving = true;
        }

        if (!aiMoving && this.state === 'walk' && this.stateTimer <= 0) {
          this.state = 'idle';
        }

        // 6. Strategic Attacks
        if (!aiMoving) {
          if ((charType === 'fire' || charType === 'lightning') && dist < this.w * 0.6) {
            if (r < 0.20 * diffMult * spdMult) {
              this.doAttack('punch', opponent);
              setTimeout(() => { if (this.hp > 0 && opponent.hp > 0 && this.state !== 'ko') this.doAttack('kick', opponent); }, 250);
            } else if (r < 0.25 * diffMult * jumpFreq && this.specialCD <= 0) {
              this.doSpecialFlip(opponent);
            }
          } else if (charType === 'ice' && dist > this.w * 0.8) {
            if (r < 0.3 * diffMult * projFreq && this.specialCD <= 0) {
              this.fireProj();
            } else if (r < 0.4 && opponent.state === 'jump') {
              this.doAttack('kick', opponent);
            }
          } else if ((charType === 'dark' || charType === 'earth') && dist < this.w * 0.5) {
            if (r < 0.15 * diffMult) {
              this.doAttack(r > 0.5 ? 'punch' : 'kick', opponent);
            } else if (r < 0.2 * diffMult && this.specialCD <= 0) {
              this.doSpecialRoll(opponent);
            }
          } else if (dist < this.w * 0.55 && r < 0.12 * diffMult) {
            this.doAttack(r > 0.5 ? 'punch' : 'kick', opponent);
          }
        }

        // 7. Random Mobility (Agility injections)
        if (r < (0.015 * jumpFreq)) {
          if ((charType === 'dark' || charType === 'lightning') && dist > this.w * 0.8) {
            this.state = 'roll_forward'; this.stateTimer = 0.5;
            this.knockVX = (opponent.x > this.x) ? 18 : -18;
            SFX.dash();
          } else {
            this.vy = -26; this.state = 'jump'; this.stateTimer = 0.5;
          }
        }

        // 8. Anti-Air Reaction
        if (opponent.y < GROUND() - 50 && dist < this.w * 0.8 && r < 0.5 * diffMult) {
          this.doAttack('punch', opponent);
        }
      }

      doAttack(type, opponent) {
        this.state = type;
        if (QATracker.active) QATracker.misses++;
        const spdMult = this.isPlayer ? 1.2 : (this.ld?.speedMult || 1);
        this.stateTimer = type === 'punch' ? (0.25 / spdMult) : (0.4 / spdMult);
        this.knockVX = this.facingRight ? 4 : -4;

        if (type === 'punch') SFX.dash();

        this.hitStop = 0.05;

        if (opponent) {
          const dist = Math.abs(this.x - Math.max(opponent.x, this.x - this.w) - Math.min(opponent.x - this.x, 0));
          const range = type === 'punch' ? this.w * 0.45 : this.w * 0.60;
          const isOpponentInvincible = (opponent.state === 'roll' || opponent.state === 'evade_back' || opponent.state === 'roll_forward');
          if (dist < range && !isOpponentInvincible) {
            let baseDmg = type === 'punch' ? 8 + Math.random() * 5 : 14 + Math.random() * 6;
            if (!this.isPlayer) baseDmg *= (this.ld?.hitPow || 1);

            const dir = this.facingRight ? 1 : -1;
            const isHeavyHit = type === 'kick';

            opponent.takeHit(baseDmg, dir, isHeavyHit);
            this.hitStop = isHeavyHit ? 0.15 : 0.08;

            if (this.isPlayer) {
              comboCount++; comboTimer = 1.2;
              this.super = Math.min(100, this.super + 8 + comboCount * 2);
            } else {
              this.super = Math.min(100, this.super + 10);
            }

            if (QATracker.active) { QATracker.misses--; QATracker.hits++; }

            const ptType = isHeavyHit ? 'super_spark' : 'hitspark';
            spawnParticles(opponent.x, opponent.y - opponent.h * (isHeavyHit ? 0.3 : 0.5), ptType);
          }
        }
      }

      fireProj() {
        if (this.isPlayer && comboCount < 3) return;
        if (QATracker.active) QATracker.specials++;
        this.state = 'special'; this.stateTimer = 0.4; this.specialCD = 1.2;
        const dir = this.facingRight ? 1 : -1;
        const type = this.isPlayer ? 'super' : (this.ld?.special || 'fire');
        projectiles.push(new Projectile(this.x + dir * this.w * 0.4, this.y - this.h * 0.4, dir, type, this.isPlayer));
        screenShake = 5;
        if (this.isPlayer) comboCount = 0;

        if (this.companion) {
          const opp = (this === player) ? enemy : player;
          this.companion.triggerBite(opp);
        }
      }

      doSpecialRoll(opponent) {
        if (QATracker.active) QATracker.specials++;
        this.state = 'special_roll'; this.stateTimer = 0.6; this.specialCD = 1.5;
        this.knockVX = this.facingRight ? 18 : -18; this.vy = -10;
      }

      doSpecialFlip(opponent) {
        if (QATracker.active) QATracker.specials++;
        this.state = 'special_flip'; this.stateTimer = 0.7; this.specialCD = 1.5;
        this.knockVX = this.facingRight ? 12 : -12; this.vy = -18;
      }

      doSuper(opponent) {
        if (this.isPlayer && comboCount < 5) return;
        if (QATracker.active) QATracker.specials++;
        this.super = 0; this.state = 'super'; this.stateTimer = 0.9;
        screenShake = 25; flashTimer = 0.4;
        const dir = this.facingRight ? 1 : -1;
        if (this.isPlayer) comboCount = 0;

        const projType = this.isPlayer ? 'super' : (this.ld?.special || 'fire');
        projectiles.push(new Projectile(this.x + dir * this.w * 0.3, this.y - this.h * 0.5, dir, projType, this.isPlayer));
        if (opponent && Math.abs(this.x - opponent.x) < this.w * 1.3) {
          opponent.takeHit(this.isPlayer ? 45 : 30, dir);
          spawnParticles(opponent.x, opponent.y - opponent.h * 0.4, projType);
        }
      }

      draw() {
        const imgCanvas = processedSprites[this.cleanImgSrc] || rawImgs[this.cleanImgSrc] || this.img;
        if (!imgCanvas) return;

        if (this.companion && this.hp > 0) this.companion.draw();

        const dW = this.w; const dH = this.h;
        const fY = Math.round(this.y);
        const cX = Math.round(this.x);
        const st = this.stateTimer;

        X.save();
        X.save(); X.globalAlpha = 0.5; X.fillStyle = '#000';
        X.beginPath(); X.ellipse(cX, fY + 8, dW * 0.45, 15, 0, 0, Math.PI * 2); X.fill(); X.restore();

        X.translate(cX, fY);

        let faceScale = this.facingRight ? 1 : -1;
        if (this.cleanImgSrc.includes('_left.png') || this.cleanImgSrc.includes('_right.png')) faceScale = 1; // Actual sprites don't need reverse if strictly loaded

        X.filter = `saturate(1.8) contrast(1.1) brightness(1.1)`;
        if (this.hitFlash > 0) X.filter = `brightness(2) contrast(1.5)`;

        X.scale(faceScale, 1);

        let sX = 1, sY = 1, rot = 0, offX = 0, offY = 0;
        if (!this._lerpSX) {
          this._lerpSX = 1; this._lerpSY = 1; this._lerpRot = 0;
          this._lerpOX = 0; this._lerpOY = 0;
        }

        switch (this.state) {
          case 'idle': sY = 1 + Math.sin(this.t * 3) * 0.02; sX = 1 - Math.sin(this.t * 3) * 0.01; break;
          case 'walk': offY = Math.abs(Math.sin(this.t * 12)) * 10; rot = Math.sin(this.t * 6) * 0.05; break;
          case 'roll': offY = dH * 0.4; rot = this.t * 15; sX = 0.7; sY = 0.7; break;
          case 'punch': offX = dW * 0.3; rot = 0.2; sX = 1.08; sY = 0.92; break;
          case 'kick': offX = dW * 0.1; rot = -0.25; sX = 0.9; sY = 1.1; offY = -dH * 0.05; break;
          case 'jump': sX = 0.9; sY = 1.1; rot = this.vy > 0 ? 0.1 : -0.1; break;
          case 'hit': rot = -0.3; offX = -dW * 0.2; sX = 0.85; sY = 1.15; break;
          case 'block': rot = -0.1; sX = 1.1; sY = 0.9; offX = -dW * 0.1; break;
          case 'ko': rot = -Math.PI / 2; offY = -dH * 0.10; sX = 1.0; sY = 0.8; break;
          case 'special_roll': offY = dH * 0.3; rot = this.facingRight ? this.t * 20 : -this.t * 20; sX = 0.7; sY = 0.7; break;
          case 'special_flip': rot = this.facingRight ? this.t * 18 : -this.t * 18; sX = 0.8; sY = 0.8; break;
          case 'evade_back': offX = -dW * 0.3; sX = 0.85; sY = 1.05; rot = -0.15; break;

    function initVoiceEffects() {
      if (voiceAudioCtx) return;
      voiceAudioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Wärme (Bass Boost & Low-Mid Warmth)
      voiceFilter = voiceAudioCtx.createBiquadFilter();
      voiceFilter.type = 'lowshelf';
      voiceFilter.frequency.value = 180; // Tiefer ansetzen für echte Stimmwärme
      voiceFilter.gain.value = 8; // Deutlich mehr Wärme

      // Sanfter Raum (sehr subtil, ohne Echo/Verdopplung)
      const convolver = voiceAudioCtx.createConvolver();
      // Anstelle eines echten Impulses nutzen wir einen extrem kurzen Delay (Haas Effekt) nur für etwas Körper, KEIN Echo
      const delay = voiceAudioCtx.createDelay();
      delay.delayTime.value = 0.02; // 20ms = kein hörbares Echo, nur "Körper"

      const voiceGain = voiceAudioCtx.createGain();
      voiceGain.gain.value = 0.8; // Wieder etwas lauter, da Halleffekt wegfällt

      // Routing: Source -> Filter (Wärme) -> Split (Direkt + Mikro-Delay für Körper) -> Gain
      voiceFilter.connect(voiceGain);

      voiceFilter.connect(delay);
      const delayGain = voiceAudioCtx.createGain();
      delayGain.gain.value = 0.15; // Sehr unterschwelliger Körper
      delay.connect(delayGain);
      delayGain.connect(voiceGain);

      voiceGain.connect(voiceAudioCtx.destination);

      if (currentAudioTrack) currentAudioTrack.pause();
      currentAudioTrack = audioTracks[type];

      if (currentAudioTrack) {
        if (!voiceAudioCtx) initVoiceEffects();
        if (voiceAudioCtx.state === 'suspended') voiceAudioCtx.resume();

        if (!voiceSources[type]) {
          try {
            voiceSources[type] = voiceAudioCtx.createMediaElementSource(currentAudioTrack);
            voiceSources[type].connect(voiceFilter);
          } catch (e) { console.warn("AudioContext connect fail:", e); }
        }

        SFX.duckBGM(0.15, 1000);
        currentAudioTrack.currentTime = 0;

        currentAudioTrack.addEventListener('ended', () => { SFX.restoreBGM(); }, { once: true });

        currentAudioTrack.play().catch(e => {
          console.warn("Could not play MP3, using browser TTS fallback:", e);
          playFallbackTTS(linesArray);
        });
      } else {
        playFallbackTTS(linesArray);
      }
    }

    function playFallbackTTS(linesArray) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      let speechText = "";
      for (let l of linesArray) {
        if (!l.text) continue;
        if (l.style === 'title' || l.style === 'mega' || l.style === 'instruction' || l.style === 'divider' || l.style === 'gap') continue;
        if (l.text.includes('=')) continue;
        let t = l.text;
        if (t === '(Pause)') t = ' ... ';
        else if (t === '(Längere Pause)') t = ' ... ... ';
        else if (t === '(Lange, ruhige Pause)' || t === '(Lange, ausklingende Pause)') t = ' ... ... ... ';
        speechText += t + ' ';
      }
      const u = new SpeechSynthesisUtterance(speechText);
      u.lang = 'de-DE'; u.rate = 0.88; u.pitch = 0.9;
      const voices = speechSynthesis.getVoices();
      const germanVoices = voices.filter(v => v.lang.startsWith('de'));
      const preferredVoice = germanVoices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('google')) || germanVoices[0];
      if (preferredVoice) u.voice = preferredVoice;

      SFX.duckBGM(0.15, 1000);
      u.onend = () => { SFX.restoreBGM(); };

      speechSynthesis.speak(u);
    }

    // ===== GAME LOOP =====
    function gameLoop(ts) {
      requestAnimationFrame(gameLoop);
      try {
        updateSkipButton();
        pollGamepad();
        let dtMult = 1.0;

        if ((player && player.hitStop > 0) || (enemy && enemy.hitStop > 0)) {
          dtMult = 0;
          if (player && player.hitStop > 0) player.hitStop -= 0.016;
          if (enemy && enemy.hitStop > 0) enemy.hitStop -= 0.016;
        }

        const dtRaw = (ts - lastTime) / 1000;
        if (QATracker.active && dtRaw > 0.035) QATracker.frameDrops++;
        const dt = Math.min(dtRaw, 0.05) * dtMult;
        lastTime = ts;
        time += dt;

        // --- Main Menu Lightning Effect ---
        if (gameState === 'menu' && !document.getElementById('main-menu').classList.contains('hidden')) {
          if (time > nextLightning) {
            document.getElementById('main-menu').classList.add('lightning-active');
            SFX.hitHeavy(); // Using a heavy hit sound to simulate thunder rumble
            setTimeout(() => {
              const menuDiv = document.getElementById('main-menu');
              if (menuDiv) menuDiv.classList.remove('lightning-active');
            }, 500);
            nextLightning = time + 4000 + Math.random() * 8000;
          }
        }

        X.clearRect(0, 0, C.width, C.height);
        X.save();
        if (screenShake > 0) {

          screenShake *= 0.85; if (screenShake < 0.5) screenShake = 0;

        const ld = LEVELS[currentLevel || 0]; const si = rawImgs[ld.stage];

        if (gameState === 'init') {

          // Stars with twinkle
